name: cloud-run-ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test
        run: mvn -B test
      - name: Package
        run: mvn -B -DskipTests package
      - name: Build container
        run: docker build -t cusina-ai:ci .

