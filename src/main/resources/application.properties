server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.web.locale=pl_PL
spring.web.locale-resolver=fixed
spring.messages.basename=messages
spring.thymeleaf.cache=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

ai.provider=anthropic

anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:2048}
anthropic.timeout-seconds=${ANTHROPIC_TIMEOUT_SECONDS:15}
anthropic.meal-count=3
anthropic.dietary-preference-max-length=500

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true

ingredients.persistence.file=data/ingredients.json
ingredients.persistence.firestore.enabled=${FIRESTORE_ENABLED:false}
ingredients.persistence.firestore.project-id=${GOOGLE_CLOUD_PROJECT:}
ingredients.persistence.firestore.collection=${FIRESTORE_COLLECTION:ingredientSessions}
ingredients.persistence.firestore.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}

