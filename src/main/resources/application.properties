server.port=8080
spring.thymeleaf.cache=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.config.import=optional:file:./application-local.properties

ai.provider=anthropic

anthropic.api-key=${ANTHROPIC_API_KEY:${anthropic.api-key.local:}}
anthropic.model=claude-haiku-4-5
anthropic.max-tokens=2048
anthropic.timeout-seconds=30
anthropic.meal-count=3
anthropic.dietary-preference-max-length=500

ollama.base-url=http://localhost:11434
ollama.model=llama3.1

ingredients.persistence.file=data/ingredients.json

