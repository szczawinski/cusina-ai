<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page('Poproś o sugestie dań', ~{::section})}">
<section>
    <h1>Sugestie dań</h1>

    <div class="card">
        <h2>Wybrane składniki</h2>
        <ul class="ingredient-summary">
            <li th:each="ingredient : ${ingredients}" th:text="${ingredient.displayName + ' (' + ingredient.displayAmount + ')'}"></li>
        </ul>
        <a class="cta-link" th:href="@{/ingredients}">Edytuj składniki</a>
    </div>

    <div class="card">
        <form th:action="@{/meal-request/suggest}" method="post" th:object="${mealRequest}">
            <label for="dietaryPreferences">Preferencje żywieniowe (opcjonalnie)</label>
            <textarea id="dietaryPreferences" th:field="*{dietaryPreferences}" th:attr="maxlength=${charLimit}"></textarea>
            <div class="char-counter"><span id="prefCount">0</span>/<span th:text="${charLimit}">500</span></div>
            <div class="flash-error" th:if="${#fields.hasErrors('dietaryPreferences')}" th:errors="*{dietaryPreferences}"></div>

            <label for="dishType">Typ dania (opcjonalnie)</label>
            <select id="dishType" th:field="*{dishType}">
                <option value="">Wybierz…</option>
                <option th:each="dish : ${dishTypes}" th:value="${dish.value()}" th:text="${dish.value()}"></option>
            </select>
            <div class="flash-error" th:if="${#fields.hasErrors('dishType')}" th:errors="*{dishType}"></div>

            <label for="dietType">Typ diety (opcjonalnie)</label>
            <select id="dietType" th:field="*{dietType}">
                <option value="">Wybierz…</option>
                <option th:each="diet : ${dietTypes}" th:value="${diet.value()}" th:text="${diet.value()}"></option>
            </select>
            <div class="flash-error" th:if="${#fields.hasErrors('dietType')}" th:errors="*{dietType}"></div>

            <button type="submit">Pokaż sugestie dań</button>
        </form>
    </div>

    <script>
        const textarea = document.getElementById('dietaryPreferences');
        const counter = document.getElementById('prefCount');
        const updateCount = () => counter.textContent = textarea.value.length.toString();
        updateCount();
        textarea.addEventListener('input', updateCount);
    </script>
</section>
</html>
