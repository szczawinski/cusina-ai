<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="page(title, content)">
    <html lang="pl">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title th:text="${title} + ' — Cusina AI'">Cusina AI</title>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>
    <body>
    <header class="top-nav">
        <div class="brand">Cusina AI</div>
        <nav>
            <a th:href="@{/ingredients}">Składniki</a>
            <a th:href="@{/meal-request}">Sugestie dań</a>
        </nav>
    </header>
    <main class="container">
        <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="flash-error" th:text="${errorMessage}"></div>
        <th:block th:replace="${content}"></th:block>
    </main>
    <footer class="footer">Cusina AI · gotowanie z AI po polsku</footer>
    </body>
    </html>
</th:block>
</body>
</html>
