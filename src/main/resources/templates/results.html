<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page('Your Meal Suggestions', ~{::section})}">
<section>
    <h1>Your Meal Suggestions</h1>

    <div th:if="${mealResponse.hasError()}" class="flash-error">
        <p th:text="${mealResponse.error}"></p>
        <a th:href="@{/meal-request}">Try Again</a>
    </div>

    <div th:if="${mealResponse.hasWarning()}" class="warning" th:text="${mealResponse.warning}"></div>

    <div th:unless="${mealResponse.hasError()}">
        <article class="card" th:each="meal : ${mealResponse.meals}">
            <h2 th:text="${meal.name}"></h2>
            <p th:text="${meal.description}"></p>
            <ol>
                <li th:each="step : ${meal.steps}" th:text="${step}"></li>
            </ol>
        </article>
    </div>

    <a th:href="@{/ingredients}">Start Over</a>
    <a th:href="@{/meal-request}">New Search</a>
</section>
</html>
