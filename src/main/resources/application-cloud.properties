spring.main.banner-mode=off
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.server.port=${PORT:8080}
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

logging.level.root=INFO
logging.level.com.cusina.ai=INFO

# Cloud tuning: faster responses with lower token limit.
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:1200}
anthropic.timeout-seconds=${ANTHROPIC_TIMEOUT_SECONDS:12}

ingredients.persistence.firestore.enabled=${FIRESTORE_ENABLED:true}
